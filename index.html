<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shaka Zulu: Iklwa Empire 3D+</title>
<style>
body { margin:0; overflow:hidden; background:black; font-family:Arial; }
#menu { position:absolute; width:100%; height:100%; display:flex; flex-direction:column; justify-content:center; align-items:center; color:white; background:#000; z-index:2; }
button { padding:15px 30px; font-size:18px; margin-top:20px; }
#ui { position:absolute; top:10px; left:10px; color:white; z-index:2; }
#controls { position:absolute; bottom:20px; left:50%; transform:translateX(-50%); z-index:2; display:none; }
.ctrl-btn { width:60px; height:60px; margin:5px; font-size:20px; }
</style>
</head>
<body><div id="menu">
<h1>Shaka Zulu: Iklwa Empire</h1>
<button onclick="startGame()">Start Game</button>
</div><div id="ui">HP: 100 | Stage: 1</div><div id="controls">
<button class="ctrl-btn" onclick="press('w')">↑</button><br>
<button class="ctrl-btn" onclick="press('a')">←</button>
<button class="ctrl-btn" onclick="press('s')">↓</button>
<button class="ctrl-btn" onclick="press('d')">→</button>
<button class="ctrl-btn" onclick="attack()">⚔️</button>
</div><script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script><script src="https://cdn.jsdelivr.net/npm/three@0.152.2/examples/js/loaders/GLTFLoader.js"></script><script>
let scene, camera, renderer, player, enemies = [], keys = {}, mixer;
let hp = 100, stage = 1;

function init(){
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x222222);

    camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    camera.position.set(0,5,10);

    renderer = new THREE.WebGLRenderer({antialias:true});
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const light = new THREE.DirectionalLight(0xffffff, 1);
    light.position.set(5,10,7);
    scene.add(light);

    const ground = new THREE.Mesh(
        new THREE.PlaneGeometry(100,100),
        new THREE.MeshStandardMaterial({color:0x228B22})
    );
    ground.rotation.x = -Math.PI/2;
    scene.add(ground);

    loadPlayer();
    spawnEnemies(3);

    if(isMobile()) document.getElementById('controls').style.display='block';

    animate();
}

function loadPlayer(){
    const loader = new THREE.GLTFLoader();
    loader.load('https://threejs.org/examples/models/gltf/Soldier.glb', function(gltf){
        player = gltf.scene;
        player.scale.set(1.5,1.5,1.5);
        scene.add(player);

        mixer = new THREE.AnimationMixer(player);
        const action = mixer.clipAction(gltf.animations[0]);
        action.play();
    });
}

function spawnEnemies(count){
    enemies.forEach(e=>scene.remove(e));
    enemies = [];

    for(let i=0;i<count;i++){
        const enemy = new THREE.Mesh(
            new THREE.CapsuleGeometry(0.5,1.5),
            new THREE.MeshStandardMaterial({color:0xff0000})
        );
        enemy.position.set(Math.random()*20-10,1,Math.random()*20-10);
        enemy.hp = 50;
        enemies.push(enemy);
        scene.add(enemy);
    }
}

function movePlayer(){
    if(!player) return;
    if(keys['w']) player.position.z -= 0.2;
    if(keys['s']) player.position.z += 0.2;
    if(keys['a']) player.position.x -= 0.2;
    if(keys['d']) player.position.x += 0.2;
}

function enemyAI(){
    enemies.forEach(e=>{
        const dx = player.position.x - e.position.x;
        const dz = player.position.z - e.position.z;
        const dist = Math.sqrt(dx*dx + dz*dz);

        if(dist > 1){
            e.position.x += dx * 0.01;
            e.position.z += dz * 0.01;
        } else {
            hp -= 0.1;
        }
    });
}

function attack(){
    enemies.forEach(e=>{
        const dx = player.position.x - e.position.x;
        const dz = player.position.z - e.position.z;
        const dist = Math.sqrt(dx*dx + dz*dz);
        if(dist < 2){ e.hp -= 25; }
    });

    enemies = enemies.filter(e=>{
        if(e.hp <=0){ scene.remove(e); return false; }
        return true;
    });

    if(enemies.length === 0){
        stage++;
        spawnEnemies(stage + 2);
    }
}

function updateUI(){
    document.getElementById('ui').innerText = `HP: ${Math.floor(hp)} | Stage: ${stage}`;
}

function animate(){
    requestAnimationFrame(animate);
    movePlayer();
    if(player) enemyAI();

    if(mixer) mixer.update(0.01);

    camera.lookAt(player ? player.position : new THREE.Vector3());
    renderer.render(scene, camera);

    updateUI();
}

function startGame(){
    document.getElementById('menu').style.display='none';
    init();
}

function press(key){ keys[key] = true; setTimeout(()=>keys[key]=false,200); }

function isMobile(){ return /Android|iPhone/i.test(navigator.userAgent); }

window.addEventListener('keydown', e=>{
    keys[e.key.toLowerCase()] = true;
    if(e.key === ' ') attack();
});
window.addEventListener('keyup', e=>{ keys[e.key.toLowerCase()] = false; });
</script></body>
</html>
