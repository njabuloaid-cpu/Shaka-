<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shaka Zulu: Iklwa Empire • 3D</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        :root { --zulu-red: #8B0000; --zulu-gold: #DAA520; }
        body { margin:0; padding:0; background:#000; color:#fff; font-family:'Press Start 2P',system-ui; overflow:hidden; display:flex; flex-direction:column; align-items:center; height:100vh; touch-action:none; }
        header { width:100%; max-width:900px; background:var(--zulu-red); padding:8px 15px; display:flex; justify-content:space-between; align-items:center; box-shadow:0 4px 10px rgba(0,0,0,0.5); z-index:10; font-size:0.9em; }
        .title { font-size:20px; letter-spacing:3px; text-shadow:3px 3px 0 #000; }
        .stats { display:flex; gap:12px; font-size:13px; }
        .health-bar { width:120px; height:18px; background:#222; border:3px solid var(--zulu-gold); position:relative; overflow:hidden; }
        .health-fill { height:100%; background:linear-gradient(#00ff00,#00cc00); transition:width 0.3s; }
        #canvas { border:8px solid var(--zulu-gold); border-radius:8px; box-shadow:0 0 30px rgba(218,165,32,0.6); background:#111; width:100%; max-width:900px; height:calc(100vh - 68px); display:block; }
        .overlay { position:absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); display:none; flex-direction:column; align-items:center; justify-content:center; z-index:100; text-align:center; padding:20px; box-sizing:border-box; }
        .overlay.active { display:flex; }
        .overlay h1 { font-size:42px; color:var(--zulu-gold); text-shadow:6px 6px 0 var(--zulu-red); margin-bottom:10px; letter-spacing:8px; }
        button { font-family:'Press Start 2P',system-ui; font-size:18px; padding:15px 40px; background:var(--zulu-red); color:#fff; border:6px solid var(--zulu-gold); cursor:pointer; margin-top:20px; box-shadow:0 6px 0 #000; transition:all 0.1s; }
        button:hover { transform:translateY(-4px); box-shadow:0 10px 0 #000; }
        .instructions { position:absolute; bottom:12px; left:12px; background:rgba(0,0,0,0.8); padding:8px 12px; font-size:11px; border:3px solid var(--zulu-gold); pointer-events:none; line-height:1.3; z-index:50; max-width:92%; }
        #objective-ui, #message, #minimap, #mobile-controls { /* your existing styles */ }
        /* Add the rest of your original styles here if needed (objective-ui, message, minimap, mobile-controls, etc.) */
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
</head>
<body>
    <!-- Your full HTML structure stays exactly the same -->
    <header>
        <div class="title">SHAKA ZULU • IKLWA EMPIRE</div>
        <div class="stats">
            <div class="stat"><span>SCORE</span><span id="score" style="color:var(--zulu-gold);font-size:20px;">00000</span></div>
            <div class="stat"><span>HEALTH</span><div class="health-bar"><div id="health-fill" class="health-fill" style="width:100%"></div></div></div>
            <div class="stat"><span>HIGH</span><span id="highscore" style="color:var(--zulu-gold);font-size:20px;">00000</span></div>
            <div class="stat" style="font-size:12px;color:var(--zulu-gold);">STAGE <span id="stage-ui">1/5</span></div>
        </div>
    </header>

    <canvas id="canvas"></canvas>
    <canvas id="minimap" width="130" height="130"></canvas>

    <div class="instructions" id="instructions">
        PC: WASD + Mouse • SHIFT Sprint • SPACE Jump<br>
        S=Stab • K=Kick • H=Shield • L-Click=Throw<br>
        MOBILE: Joystick + buttons
    </div>

    <div id="objective-ui"></div>
    <div id="message"></div>

    <div id="mobile-controls"> <!-- your mobile controls HTML unchanged --> </div>

    <!-- All your overlay screens (start-screen, game-over, victory, pause, story) unchanged -->

    <footer>Debug version - Open F12 Console and check for logs/errors</footer>

    <script>
        let scene, camera, renderer, playerGroup, player;
        let enemies = [], projectiles = [], particles = [], collectibles = [];
        let score = 0, highScore = localStorage.getItem('shaka3DHighScore') || 0;
        let gameRunning = false, paused = false, currentStage = 1;
        const maxStages = 5;
        let keys = {}, yaw = 0, pitch = 0, attackCooldown = 0, shieldActive = false, shieldTime = 0;
        let velocityY = 0, isJumping = false;
        let currentWeapon = "IKLWA";
        let audioCtx;
        let abilitiesUnlocked = {};
        let isMobile = false;
        let minimapCtx;

        // === THREE.JS SETUP ===
        function initThree() {
            const canvas = document.getElementById('canvas');
            renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
            renderer.setClearColor(0x112211); // visible dark background instead of pure black

            scene = new THREE.Scene();
            scene.fog = new THREE.Fog(0x112211, 50, 200);

            camera = new THREE.PerspectiveCamera(70, canvas.clientWidth / canvas.clientHeight, 0.1, 300);

            // Lights
            scene.add(new THREE.HemisphereLight(0x88aa77, 0x334422, 1.0));
            const sun = new THREE.DirectionalLight(0xffeecc, 1.5);
            sun.position.set(60, 120, 80);
            scene.add(sun);

            // LARGE visible ground (so you see something immediately)
            const ground = new THREE.Mesh(
                new THREE.PlaneGeometry(400, 400),
                new THREE.MeshLambertMaterial({ color: 0x3d6c3d })
            );
            ground.rotation.x = -Math.PI / 2;
            scene.add(ground);

            // Player (bigger & clearly visible)
            playerGroup = new THREE.Group();
            scene.add(playerGroup);

            const torso = new THREE.Mesh(
                new THREE.BoxGeometry(2, 3.5, 1.8),
                new THREE.MeshPhongMaterial({ color: 0x3d2b1f })
            );
            torso.position.y = 1.75;
            playerGroup.add(torso);

            const head = new THREE.Mesh(
                new THREE.SphereGeometry(0.9, 20, 20),
                new THREE.MeshPhongMaterial({ color: 0x8b5a2b })
            );
            head.position.y = 4.2;
            playerGroup.add(head);

            player = playerGroup;
            player.position.set(0, 0.1, 0); // on ground
            player.userData = { health: 100, weaponDamage: 1 };

            // Camera positioned safely behind & above player
            camera.position.set(0, 12, 30);
            camera.lookAt(0, 3, 0);

            resizeCanvas();

            // Force render immediately so you see the ground + player even before "start"
            renderer.render(scene, camera);
            console.log("✅ Three.js initialized - ground and player should be visible");
        }

        function resizeCanvas() {
            const canvas = document.getElementById('canvas');
            if (!renderer || !camera) return;

            const w = Math.min(window.innerWidth - 30, 900);
            const h = Math.max(420, window.innerHeight - 78);

            renderer.setSize(w, h);
            camera.aspect = w / h;
            camera.updateProjectionMatrix();
        }

        function gameLoop() {
            if (!gameRunning || paused) {
                requestAnimationFrame(gameLoop);
                return;
            }

            // TODO: Put your updatePlayer(), enemy logic, etc. here

            renderer.render(scene, camera);
            requestAnimationFrame(gameLoop);
        }

        function startGame() {
            document.getElementById('start-screen').classList.remove('active');
            if (!scene) initThree();

            // Your reset logic
            score = 0; currentStage = 1;
            enemies = []; projectiles = []; collectibles = []; particles = [];
            player.position.set(0, 0.1, 0);
            player.userData.health = 100;
            yaw = 0;
            abilitiesUnlocked = {stab:true, kick:false, shieldBlock:false, throwIklwa:false};

            // Call your other functions (createStage, showStageStory, spawnStageEnemies, updateScoreUI, etc.)
            // createStage(1); showStageStory(1); spawnStageEnemies(1); etc.

            gameRunning = true;
            paused = false;

            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (isMobile) document.getElementById('mobile-controls').style.display = 'flex';
            document.getElementById('minimap').style.display = 'block';

            gameLoop();
            console.log("🚀 Game started - animation loop running");
        }

        function init() {
            document.getElementById('highscore').textContent = String(highScore).padStart(5, '0');
            minimapCtx = document.getElementById('minimap').getContext('2d');
            isMobile = /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent);

            if (isMobile) document.getElementById('mobile-controls').style.display = 'flex';

            // Show scene early
            initThree();

            console.log('%c✅ Shaka Zulu debug version loaded - check F12 Console', 'color:#DAA520;font-size:15px');
        }

        window.onload = init;
        window.addEventListener('resize', resizeCanvas);

        // Your other functions (playSound, mobileAction, updateScoreUI, etc.) go here unchanged
        window.mobileAction = function(action) {
            if (!gameRunning) return;
            // your existing mobileAction code
        };
    </script>
</body>
                </html>
