<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shaka Zulu: Iklwa Empire • Preview</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        :root { --zulu-red: #8B0000; --zulu-gold: #DAA520; }
        body { margin:0; padding:0; background:#000; color:#fff; font-family:'Press Start 2P',system-ui; overflow:hidden; height:100vh; touch-action:none; }
        header { width:100%; max-width:900px; background:var(--zulu-red); padding:8px 15px; display:flex; justify-content:space-between; align-items:center; box-shadow:0 4px 10px rgba(0,0,0,0.5); z-index:10; }
        .title { font-size:20px; letter-spacing:3px; text-shadow:3px 3px 0 #000; }
        #canvas { border:8px solid var(--zulu-gold); border-radius:8px; box-shadow:0 0 30px rgba(218,165,32,0.6); background:#111; width:100%; max-width:900px; height:calc(100vh - 68px); display:block; margin:10px auto; }
        .overlay { position:absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); display:none; flex-direction:column; align-items:center; justify-content:center; z-index:100; text-align:center; padding:20px; }
        .overlay.active { display:flex; }
        button { font-family:'Press Start 2P',system-ui; font-size:18px; padding:15px 40px; background:var(--zulu-red); color:#fff; border:6px solid var(--zulu-gold); cursor:pointer; margin-top:20px; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
</head>
<body>
    <header>
        <div class="title">SHAKA ZULU • IKLWA EMPIRE (PREVIEW)</div>
    </header>

    <canvas id="canvas"></canvas>

    <div id="start-screen" class="overlay active">
        <h1>SHAKA ZULU</h1>
        <h2>IKLWA EMPIRE</h2>
        <p>3D Warrior Preview • Click to begin</p>
        <button onclick="startPreview()">BEGIN THE CONQUEST</button>
    </div>

    <footer style="position:absolute; bottom:8px; width:100%; text-align:center; font-size:10px; opacity:0.6;">
        Open F12 Console for logs • Hard refresh if still black
    </footer>

    <script>
        let scene, camera, renderer, player;
        let gameRunning = false;

        function initThree() {
            console.log("Initializing Three.js...");
            const canvas = document.getElementById('canvas');
            
            renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
            renderer.setClearColor(0x112211);

            scene = new THREE.Scene();
            scene.fog = new THREE.Fog(0x112211, 50, 200);

            camera = new THREE.PerspectiveCamera(70, canvas.clientWidth / canvas.clientHeight, 0.1, 300);

            // Lights
            scene.add(new THREE.HemisphereLight(0x88aa77, 0x334422, 1.2));
            const sun = new THREE.DirectionalLight(0xffeecc, 1.8);
            sun.position.set(60, 120, 80);
            scene.add(sun);

            // Large visible ground
            const ground = new THREE.Mesh(
                new THREE.PlaneGeometry(400, 400),
                new THREE.MeshLambertMaterial({ color: 0x3d6c3d })
            );
            ground.rotation.x = -Math.PI / 2;
            scene.add(ground);

            // Zulu Warrior (visible box + head + spear)
            const playerGroup = new THREE.Group();
            scene.add(playerGroup);

            // Torso
            const torso = new THREE.Mesh(
                new THREE.BoxGeometry(2, 3.5, 1.8),
                new THREE.MeshPhongMaterial({ color: 0x3d2b1f })
            );
            torso.position.y = 1.75;
            playerGroup.add(torso);

            // Head
            const head = new THREE.Mesh(
                new THREE.SphereGeometry(0.9, 20, 20),
                new THREE.MeshPhongMaterial({ color: 0x8b5a2b })
            );
            head.position.y = 4.2;
            playerGroup.add(head);

            // Simple spear
            const spear = new THREE.Mesh(
                new THREE.CylinderGeometry(0.08, 0.05, 4, 8),
                new THREE.MeshPhongMaterial({ color: 0xaaaaaa })
            );
            spear.position.set(-1.2, 3, 0);
            spear.rotation.set(0.5, 0, -1.5);
            playerGroup.add(spear);

            player = playerGroup;
            player.position.set(0, 0.1, 0);

            // Safe camera position
            camera.position.set(0, 15, 35);
            camera.lookAt(0, 4, 0);

            resizeCanvas();
            renderer.render(scene, camera); // Force first frame
            console.log("✅ Preview scene rendered - you should see green ground + brown warrior");
        }

        function resizeCanvas() {
            if (!renderer || !camera) return;
            const canvas = document.getElementById('canvas');
            const w = Math.min(window.innerWidth - 30, 900);
            const h = Math.max(420, window.innerHeight - 78);
            renderer.setSize(w, h);
            camera.aspect = w / h;
            camera.updateProjectionMatrix();
        }

        function animate() {
            if (!gameRunning) {
                requestAnimationFrame(animate);
                return;
            }
            // Gentle rotation for preview
            if (player) player.rotation.y += 0.003;
            renderer.render(scene, camera);
            requestAnimationFrame(animate);
        }

        function startPreview() {
            document.getElementById('start-screen').classList.remove('active');
            if (!scene) initThree();
            gameRunning = true;
            animate();
            console.log("🚀 Preview started - warrior should rotate slowly");
        }

        window.onload = () => {
            console.log("%cShaka Zulu Preview loaded - check F12 Console", "color:#DAA520");
            initThree(); // Show something immediately
        };

        window.addEventListener('resize', resizeCanvas);
    </script>
</body>
    </html>
