<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rise of Shaka Zulu</title>
<style>
body { margin:0; overflow:hidden; background:black; font-family:Arial; }
#menu { position:absolute; width:100%; height:100%; display:flex; flex-direction:column; justify-content:center; align-items:center; color:white; background:#000; z-index:2; }
button { padding:15px 30px; font-size:18px; margin-top:20px; }
#ui { position:absolute; top:10px; left:10px; color:white; z-index:2; }
</style>
</head>
<body>
<div id="menu">
  <h1>Rise of Shaka Zulu</h1>
  <button onclick="startGame()">Start Game</button>
</div>
<div id="ui">HP: 100 | Stage: 1 | Loot: 0</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>
let scene, camera, renderer, player, enemies = [], keys = {};
let hp = 100, stage = 1, loot = 0;

function init(){
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x222222);
    scene.fog = new THREE.Fog(0x111111, 10, 60);

    camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    camera.position.set(0,5,12);

    renderer = new THREE.WebGLRenderer({antialias:true});
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const light = new THREE.DirectionalLight(0xffffff, 1);
    light.position.set(5,10,7);
    scene.add(light);

    const ambient = new THREE.AmbientLight(0x404040, 1.5);
    scene.add(ambient);

    const ground = new THREE.Mesh(
        new THREE.PlaneGeometry(100,100),
        new THREE.MeshStandardMaterial({color:0x228B22})
    );
    ground.rotation.x = -Math.PI/2;
    scene.add(ground);

    addProps();
    loadPlayer();
    spawnEnemies(3);

    animate();
}

function addProps(){
    for(let i=0;i<10;i++){
        const tree = new THREE.Mesh(
            new THREE.CylinderGeometry(0.3,0.5,4),
            new THREE.MeshStandardMaterial({color:0x8B4513})
        );
        const leaves = new THREE.Mesh(
            new THREE.SphereGeometry(2),
            new THREE.MeshStandardMaterial({color:0x006400})
        );
        tree.position.set(Math.random()*40-20,2,Math.random()*40-20);
        leaves.position.set(tree.position.x,4,tree.position.z);
        scene.add(tree);
        scene.add(leaves);
    }
}

function loadPlayer(){
    // Simple placeholder warrior: body + spear + shield
    const body = new THREE.Mesh(
        new THREE.BoxGeometry(1,2,1),
        new THREE.MeshStandardMaterial({color:0x333333})
    );
    body.position.y = 1;
    const shield = new THREE.Mesh(
        new THREE.CylinderGeometry(0.5,0.5,0.1,32),
        new THREE.MeshStandardMaterial({color:0x888888})
    );
    shield.position.set(0.8,1,0);
    const spear = new THREE.Mesh(
        new THREE.CylinderGeometry(0.05,0.05,3),
        new THREE.MeshStandardMaterial({color:0xaaaaaa})
    );
    spear.position.set(-0.8,1,0);
    player = new THREE.Group();
    player.add(body);
    player.add(shield);
    player.add(spear);
    scene.add(player);
}

function spawnEnemies(count){
    enemies.forEach(e=>scene.remove(e));
    enemies = [];

    for(let i=0;i<count;i++){
        let enemy;
        if(stage % 5 === 0 && i === 0){ 
            enemy = new THREE.Mesh(
                new THREE.CapsuleGeometry(1,3),
                new THREE.MeshStandardMaterial({color:0x880000, emissive:0x220000})
            );
            enemy.hp = 200;
            enemy.isBoss = true;
            enemy.position.set(0,1,-10);
        } else {
            enemy = new THREE.Mesh(
                new THREE.CapsuleGeometry(0.5,1.5),
                new THREE.MeshStandardMaterial({color:0xff0000})
            );
            enemy.hp = 50;
            enemy.position.set(Math.random()*20-10,1,Math.random()*20-10);
        }
        enemies.push(enemy);
        scene.add(enemy);
    }
}

function movePlayer(){
    if(!player) return;
    if(keys['w']) player.position.z -= 0.2;
    if(keys['s']) player.position.z += 0.2;
    if(keys['a']) player.position.x -= 0.2;
    if(keys['d']) player.position.x += 0.2;
}

function enemyAI(){
    enemies.forEach(e=>{
        const dx = player.position.x - e.position.x;
        const dz = player.position.z - e.position.z;
        const dist = Math.sqrt(dx*dx + dz*dz);

        if(dist > 1){
            e.position.x += dx * 0.01;
            e.position.z += dz * 0.01;
        } else {
            hp -= e.isBoss ? 0.3 : 0.1;
        }
    });
}

function attack(){
    enemies.forEach(e=>{
        const dx = player.position.x - e.position.x;
        const dz = player.position.z - e.position.z;
        const dist = Math.sqrt(dx*dx + dz*dz);
        if(dist < 2){ e.hp -= e.isBoss ? 20 : 25; }
    });

    enemies = enemies.filter(e=>{
        if(e.hp <=0){ 
            scene.remove(e); 
            loot++;
            return false; 
        }
        return true;
    });

    if(enemies.length === 0){
        stage++;
        spawnEnemies(stage + 2);
    }
}

function updateUI(){
    document.getElementById('ui').innerText = `HP: ${Math.floor(hp)} | Stage: ${stage} | Loot: ${loot}`;
}

function animate(){
    requestAnimationFrame(animate);
    movePlayer();
    if(player) enemyAI();

    camera.lookAt(player ? player.position : new THREE.Vector3());
    renderer.render(scene, camera);

    updateUI();
}

function startGame(){
    document.getElementById('menu').style.display='none';
    init();
}

window.addEventListener('keydown', e=>{
    keys[e.key.toLowerCase()] = true;
    if(e.key === ' ') attack();
});
window.addEventListener('keyup', e=>{ keys[e.key.toLowerCase()] = false; });
</script>
</body>
</html>
