<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shaka Zulu: Iklwa Empire • Legendary Edition</title>
<style>

body { margin:0; padding:0; background:#000; color:#fff; font-family:'Press Start 2P',system-ui; overflow:hidden; }
header { background:#8B0000; padding:10px; display:flex; justify-content:space-between; align-items:center; }
.title { font-size:22px; color:#DAA520; text-shadow:2px 2px #000; }
.stats { display:flex; gap:20px; }
.health-bar { width:140px; height:20px; background:#222; border:3px solid #DAA520; }

.health-fill { height:100%; background:linear-gradient(#00ff00,#00cc00); transition:width 0.3s; }
#canvas { width:100%; height:500px; border:6px solid #DAA520; background:#111; }
#message { position:absolute; top:150px; left:50%; transform:translateX(-50%); background:#DAA520; color:#000; padding:12px 30px; font-size:18px; border:6px solid #8B0000; display:none; }
button { font-family:'Press Start 2P'; font-size:18px; padding:12px 30px; background:#8B0000; color:#fff; border:4px solid #DAA520; cursor:pointer; }
.overlay { position:absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); display:none; align-items:center; justify-content:center; flex-direction:column; }
.overlay.active { display:flex; }

</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
</head>
<body>
<header>
<div class="title">SHAKA ZULU • IKLWA EMPIRE</div>
<div class="stats">
<div>SCORE: <span id="score">00000</span></div>
<div>HEALTH: <div class="health-bar"><div id="health-fill" class="health-fill" style="width:100%"></div></div></div>
<div>STAGE: <span id="stage-ui">1</span></div>
<div>WEAPON: <span id="weapon-ui">IKLWA</span></div>
</div>
</header>
<canvas id="canvas"></canvas>
<div id="message"></div>


<div id="start-screen" class="overlay active">
<h1>SHAKA ZULU: LEGENDARY EDITION</h1>

<button onclick="startGame()">BEGIN THE CONQUEST</button>
</div>

<div id="victory-screen" class="overlay">
<h1>ZULU EMPIRE UNITED!</h1>
<button onclick="restartGame()">PLAY AGAIN</button>
</div>

<script>
let scene, camera, renderer, player, enemies=[];
let score=0, currentStage=1, gameRunning=false;
let abilitiesUnlocked={stab:true, shield:false, kick:false, throw:false, aura:false, chant:false};
let health=100;

function initThree(){
  scene=new THREE.Scene();
  camera=new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,0.1,1000);
  renderer=new THREE.WebGLRenderer({canvas:document.getElementById('canvas')});
  renderer.setSize(window.innerWidth,500);
  player=new THREE.Mesh(new THREE.BoxGeometry(1,2,1),new THREE.MeshBasicMaterial({color:0xDAA520}));
  scene.add(player);
  camera.position.z=5;
  spawnEnemy();
}

function spawnEnemy(){
  let enemy=new THREE.Mesh(new THREE.BoxGeometry(1,2,1),new THREE.MeshBasicMaterial({color:0x8B0000}));
  enemy.position.x=Math.random()*6-3;
  enemy.position.z=-10;
  scene.add(enemy);
  enemies.push(enemy);

}

function startGame(){
  document.getElementById('start-screen').classList.remove('active');
  if(!scene) initThree();
  score=0; currentStage=1; health=100; gameRunning=true;
  showStageStory(currentStage);
  gameLoop();
}

function gameLoop(){
  if(!gameRunning) return;
  requestAnimationFrame(gameLoop);
  enemies.forEach(e=>{
    e.position.z+=0.05;
    if(e.position.z>0){
      takeDamage(5);
      e.position.z=-10;
    }
  });
  renderer.render(scene,camera);
}

function takeDamage(amount){
  if(abilitiesUnlocked.shield){ amount=Math.floor(amount/2); }
  health-=amount;
  updateHealthUI();
  if(health<=0){ victoryScreen(); }
}

function updateHealthUI(){
  document.getElementById('health-fill').style.width=Math.max(0,health)+"%";
}

function showStageStory(stage){
  let msg="";
  switch(stage){
    case 1: msg="Stage 1: Rise of Shaka — Learn the stab."; break;
    case 2: msg="Stage 2: Shield unlocked — iHawu strengthens defense."; abilitiesUnlocked.shield=true; break;
    case 3: msg="Stage 3: Kick unlocked — drive enemies back."; abilitiesUnlocked.kick=true; break;
    case 4: msg="Stage 4: Mkhonto unlocked — spear throw available."; abilitiesUnlocked.throw=true; break;
    case 5: msg="Stage 5: Spirit Blessings — glowing aura and chants."; abilitiesUnlocked.aura=true; abilitiesUnlocked.chant=true; break;
  }
  showUnlock(msg);
}

function showUnlock(msg){
  const el=document.getElementById('message');
  el.innerHTML=msg;
  el.style.display='block';
  setTimeout(()=>el.style.display='none',4000);
}

function victoryScreen(){
  gameRunning=false;

  document.getElementById('victory-screen').classList.add('active');
}

function restartGame(){
  document.getElementById('victory-screen').classList.remove('active');
  startGame();
}

// === Combat Actions with new keys ===
// J = Stab, K = Kick, L = Shield, I = Throw spear, O = Aura, P = Chant
window.addEventListener('keydown',e=>{
  if(!gameRunning) return;
  switch(e.key.toLowerCase()){
    case 'j': if(abilitiesUnlocked.stab) stab(); break;
    case 'k': if(abilitiesUnlocked.kick) kick(); break;
    case 'l': if(abilitiesUnlocked.shield) showUnlock("Shield raised!"); break;
    case 'i': if(abilitiesUnlocked.throw) throwSpear(); break;
    case 'o': if(abilitiesUnlocked.aura) glowingAura(); break;
    case 'p': if(abilitiesUnlocked.chant) warriorChant(); break;
  }
});

function stab(){
  enemies.forEach(e=>{
    if(Math.abs(e.position.z)<2){ score+=10; e.position.z=-10; showUnlock("Stab successful!"); }
  });
  updateScoreUI();
}

function kick(){
  enemies.forEach(e=>{
    if(Math.abs(e.position.z)<2){ e.position.z-=5; showUnlock("Kick pushed enemy back!"); }
  });
}

function throwSpear(){
  enemies.forEach(e=>{
    if(Math.abs(e.position.z)<5){ score+=20; e.position.z=-10; showUnlock("Mkhonto throw hit!"); }
  });
  updateScoreUI();
}

function glowingAura(){
  showUnlock("Glowing Aura — Invincible for 5s!");
  let oldHealth=health;
  setTimeout(()=>{ health=oldHealth; },5000);
}

function warriorChant(){
  showUnlock("Warrior Chant — morale boosted!");
  score+=50;
  updateScoreUI();
}

function updateScoreUI(){
  document.getElementById('score').innerText=String(score).padStart(5,'0');
}
</script>
</body>
</html>
